{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)">
    <div style="background:white;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 40px rgba(0,0,0,0.2)">
        <div style="text-align:center;margin-bottom:30px">
            <h2 style="color:#667eea">🎲 {{ APP_NAME }}</h2>
            <p style="color:#6c757d">Admin Login</p>
        </div>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" style="background:linear-gradient(135deg,#667eea,#764ba2);border:none;padding:12px;border-radius:10px;color:white;font-weight:bold;width:100%;cursor:pointer">Login</button>
        </form>
        <div class="text-center mt-3">
            <small class="text-muted">Demo: admin / admin123</small>
        </div>
    </div>
</div>
{% endblock %}
